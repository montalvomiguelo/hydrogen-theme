  #         store: ${{ secrets.SHOP_STORE }}
  #         password: ${{ secrets.SHOP_PASSWORD }}
  #         lhci_github_app_token: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Theme Check
        uses: shopify/theme-check-action@v2
        with:
          token: ${{ github.token }}
